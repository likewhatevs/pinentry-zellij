name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt
      - run: cargo fmt -- --check
      - run: cargo clippy -p pinentry-zellij-protocol --tests -- -D warnings
      - run: cargo clippy -p pinentry-zellij --tests -- -D warnings
      - run: cargo clippy -p pinentry-zellij-plugin --lib --target x86_64-unknown-linux-gnu -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip1
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest -p pinentry-zellij-protocol --lcov --output-path lcov-protocol.info
          cargo llvm-cov nextest -p pinentry-zellij-plugin --lib --target x86_64-unknown-linux-gnu --lcov --output-path lcov-plugin.info

      - name: Run main crate tests
        run: cargo nextest run -p pinentry-zellij

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov-protocol.info,lcov-plugin.info
